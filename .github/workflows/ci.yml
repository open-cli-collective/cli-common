name: CI

on:
  push:
    branches: [main]
  pull_request:

# bash on every runner (Git Bash on windows-latest): avoids PowerShell
# native-arg mangling of flags like -coverprofile=coverage.out, and lets
# the tidy check be written portably.
defaults:
  run:
    shell: bash

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Tidy
        run: |
          go mod tidy
          # Catch both modified tracked and newly-generated untracked
          # go.mod/go.sum (the latter once later tickets add deps).
          if [ -n "$(git status --porcelain -- go.mod go.sum)" ]; then
            echo "go.mod/go.sum not tidy:"
            git status --porcelain -- go.mod go.sum
            git diff -- go.mod go.sum
            exit 1
          fi
      - name: Build
        run: go build -v ./...
      - name: Test
        run: go test -v -race -coverprofile=coverage.out ./...
      # Standard consumer build configuration (working-with-secrets.md
      # §1.10): 1Password support is enabled, Passage is disabled.
      - name: Build and test with standard keyring tags
        run: |
          go build -tags keyring_nopassage ./...
          go test -race -tags keyring_nopassage ./...
      # Optional compliance/minimal-dependency build configuration:
      # 1Password support is compiled out but exposed file/pass backends
      # remain enabled.
      - name: Build and test with no-1Password opt-out tags
        run: |
          go build -tags keyring_no1password,keyring_nopassage ./...
          go test -race -tags keyring_no1password,keyring_nopassage ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
